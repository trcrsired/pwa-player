<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creditors - PWA Player</title>
    <style>
        :root {
            --bg: #fff;
            --text: #333;
            --border: #ddd;
            --link: #0066cc;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #1a1a1a;
                --text: #fff;
                --border: #333;
                --link: #4af;
            }
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }
        h1 {
            margin-bottom: 20px;
            font-size: 1.5rem;
        }
        @media (max-width: 480px) {
            body {
                padding: 15px;
            }
            h1 {
                font-size: 1.3rem;
            }
        }
        ul {
            list-style: none;
            padding: 0;
        }
        li {
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
            font-size: 1rem;
        }
        a {
            color: var(--link);
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <h1>Creditors</h1>
    <ul>
        <li>zxc</li>
        <li>游翔</li>
    </ul>
</body>
</html>
